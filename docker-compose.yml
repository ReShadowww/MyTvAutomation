services:
  mysql:
    image: mysql:9.6.0
    container_name: mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mydb
      MYSQL_USER: localuser
      MYSQL_PASSWORD: localpass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mynet

  flask:
    build: ./flask
    container_name: flask-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mynet

  tv_startup:
    build: ./tv_startup
    container_name: tv-startup
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mynet

volumes:
  mysql_data:

networks:
  mynet:
